<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prijava u lokal - Taplito Admin V2.0</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../tokens.css">
    <link rel="stylesheet" href="../../global.css">
    <style>
        body {
            background-color: var(--color-paper);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        .login-box {
            background-color: var(--color-elevated);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-lg);
            width: 100%;
            max-width: 440px;
            padding: 40px;
            box-shadow: var(--shadow-lg);
        }
        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }
        .brand-badge-large {
            width: 52px;
            height: 52px;
            background-color: var(--color-orange);
            border-radius: var(--radius-md);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: #FFFFFF;
            font-family: var(--font-heading);
            font-weight: 900;
            font-size: 28px;
            box-shadow: 0 8px 24px var(--color-orange-glow);
            margin-bottom: 16px;
        }
        .login-title {
            font-size: 26px;
            font-weight: 800;
            color: var(--color-cacao);
            letter-spacing: -0.03em;
            margin-bottom: 6px;
        }
        .login-subtitle {
            font-size: 14px;
            color: var(--color-cacao-muted);
        }
        .lang-switch {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 24px;
            font-size: 12px;
            font-weight: 600;
            color: var(--color-cacao-muted);
        }
        .lang-switch span {
            cursor: pointer;
            padding: 4px 10px;
            border-radius: var(--radius-sm);
            transition: var(--transition-fast);
        }
        .lang-switch span.active {
            background-color: var(--color-paper);
            color: var(--color-orange);
        }
    </style>
</head>
<body>
    <div class="login-box">
        <div style="margin-bottom: 16px;">
            <a href="../../index.html" style="font-size: 13px; color: var(--color-cacao-muted); text-decoration: none; font-weight: 600;">← Natrag na nadzorni portal</a>
        </div>
        <div class="login-header">
            <div class="brand-badge-large">T</div>
            <h1 class="login-title">Dobrodošli u Taplito</h1>
            <p class="login-subtitle">Prijava za voditelje i osoblje lokala (Barok Standard)</p>
        </div>

        <form onsubmit="event.preventDefault(); window.location.href='../03-menus/index.html';">
            <div class="form-group">
                <label class="form-label">E-mail adresa ili ID osoblja</label>
                <input type="email" class="form-control" placeholder="voditelj@lokal.hr" value="manager@barok.hr" required>
            </div>
            
            <div class="form-group">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px;">
                    <label class="form-label" style="margin-bottom: 0;">Lozinka / PIN</label>
                    <a href="#" style="font-size: 12px; color: var(--color-orange); text-decoration: none; font-weight: 600;" onclick="alert('Zatražite resetiranje PIN-a kod administratora sustava.')">Zaboravili ste PIN?</a>
                </div>
                <input type="password" class="form-control" placeholder="••••••••" value="taplito2026" required>
            </div>

            <div class="form-group" style="display: flex; align-items: center; gap: 10px; margin: 20px 0;">
                <input type="checkbox" id="remember" checked style="width: 16px; height: 16px; accent-color: var(--color-orange);">
                <label for="remember" style="font-size: 13px; color: var(--color-cacao); font-weight: 500;">Zapamti prijavu za ovaj uređaj</label>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 12px; font-size: 16px;">
                Prijava u lokal →
            </button>
        </form>

        <div class="lang-switch">
            <span class="active">HR (Hrvatski)</span>
            <span>EN (English)</span>
        </div>
    </div>
</body>
</html>
